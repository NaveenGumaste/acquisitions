name: Tests

on:
  push:
    branches:
      - master
      - main
      - staging
  pull_request:
    branches:
      - master
      - main
      - staging

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        id: test
        continue-on-error: true
        env:
          NODE_ENV: test
          NODE_OPTIONS: --experimental-vm-modules
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb
        run: npm test -- --coverage

      - name: Check for Test Failures
        if: steps.test.outcome == 'failure'
        run: |
          echo "::error title=Test Failures Found::One or more tests failed. Please review the logs and locally ensure 'npm test' succeeds."
          exit 1

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Generate Step Summary
        if: always()
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            echo "### ✅ Tests Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Tests Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Test coverage report has been captured and uploaded as an artifact." >> $GITHUB_STEP_SUMMARY
